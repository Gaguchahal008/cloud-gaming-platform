<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudRigs Gateway Access</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        body { background-color: #0d0d0d; color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .login-card { background: #161616; border: 1px solid #222; border-radius: 12px; width: 100%; max-width: 400px; padding: 35px 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo { font-size: 26px; font-weight: bold; text-align: center; margin-bottom: 25px; letter-spacing: 0.5px; }
        .logo span { color: #76b900; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 11px; color: #aaa; text-transform: uppercase; margin-bottom: 8px; font-weight: bold; letter-spacing: 0.5px; }
        .input-group input { width: 100%; background: #1f1f1f; border: 1px solid #333; padding: 14px; border-radius: 8px; color: #fff; outline: none; font-size: 15px; transition: 0.3s; }
        .input-group input:focus { border-color: #76b900; }
        
        .submit-btn { background: #76b900; color: #000; border: none; width: 100%; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        .submit-btn:hover { background-color: #8ae200; }
        
        .back-home { display: block; text-align: center; margin-top: 20px; font-size: 14px; color: #aaa; text-decoration: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">CLOUD<span>RIGS</span></div>
        <form id="login-form">
            <div class="input-group">
                <label>Access Gamertag ID</label>
                <input type="text" id="gamertag-input" placeholder="Enter custom gamertag..." required>
            </div>
            <div class="input-group">
                <label>Security Keyphrase</label>
                <input type="password" placeholder="••••••••" required value="123456">
            </div>
            <button class="submit-btn" type="submit">Verify Identity</button>
        </form>
        <a href="/" class="back-home">Cancel and Return</a>
    </div>

    <script>
        // Pre-fill with existing name if available
        async function loadCurrentGamertag() {
            try {
                const res = await fetch('/api/user-status');
                const data = await res.json();
                if(data.gamertag) {
                    document.getElementById('gamertag-input').value = data.gamertag;
                }
            } catch(e) { console.log(e); }
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const chosenGamertag = document.getElementById('gamertag-input').value;

            try {
                const res = await fetch('/api/update-profile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ gamertag: chosenGamertag })
                });
                
                if (res.ok) {
                    alert(`Identity Authenticated as: ${chosenGamertag}`);
                    window.location.href = '/'; // Redirect straight back to dashboard
                }
            } catch(err) {
                alert("Error authenticating identity.");
            }
        });

        window.onload = loadCurrentGamertag;
    </script>
</body>
</html>
