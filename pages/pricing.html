<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Playtime Passes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        body { background-color: #0d0d0d; color: #ffffff; padding: 30px 5% 100px 5%; }
        .back-link { color: #76b900; text-decoration: none; font-weight: bold; display: inline-block; margin-bottom: 20px; }
        h1 { font-size: 28px; margin-bottom: 8px; }
        .subtitle { color: #aaa; margin-bottom: 30px; font-size: 14px; }
        .billing-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 20px; }
        .tier-card { background: #161616; border: 1px solid #222; border-radius: 12px; padding: 20px; text-align: center; }
        .tier-card.featured { border-color: #76b900; background: linear-gradient(145deg, #161616, #131f0d); }
        .time-title { font-size: 20px; font-weight: bold; color: #76b900; }
        .price { font-size: 32px; font-weight: 800; margin: 15px 0; }
        .buy-btn { background: #222; border: 1px solid #444; color: #fff; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .tier-card.featured .buy-btn { background: #76b900; color: #000; border: none; }
        @media (max-width: 768px) { .billing-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <a href="/" class="back-link">← Back to Dashboard</a>
    <h1>Buy Game Playtime</h1>
    <p class="subtitle">Purchase playtime credits. Time applies to all library games symmetrically.</p>

    <div class="billing-grid">
        <!-- 60 Mins -->
        <div class="tier-card">
            <div class="time-title">60 Mins Pass</div>
            <div class="price">₹40</div>
            <button class="buy-btn" onclick="purchaseTime(60)">Buy 1 Hour</button>
        </div>
        <!-- 5 Hours -->
        <div class="tier-card featured">
            <div class="time-title">5 Hours Pass</div>
            <div class="price">₹200</div>
            <button class="buy-btn" onclick="purchaseTime(300)">Buy 5 Hours</button>
        </div>
        <!-- 1 Day -->
        <div class="tier-card">
            <div class="time-title">24 Hour Pass</div>
            <div class="price">₹500</div>
            <button class="buy-btn" onclick="purchaseTime(1440)">Buy 1 Day</button>
        </div>
        <!-- 1 Week -->
        <div class="tier-card">
            <div class="time-title">7 Day Pass</div>
            <div class="price">₹1200</div>
            <button class="buy-btn" onclick="purchaseTime(10080)">Buy 1 Week</button>
        </div>
    </div>

    <script>
        async function purchaseTime(mins) {
            try {
                const res = await fetch('/api/add-playtime', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ minutes: mins })
                });
                const data = await res.json();
                alert(`Pass Activated! Total Playtime Account Balance: ${data.newPlaytime} Mins`);
            } catch(e) { alert("Demo processing complete."); }
        }
    </script>
</body>
</html>
