<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Allocation Container</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        body { background-color: #0d0d0d; color: #ffffff; padding: 30px 5%; }
        
        .back-link { color: #76b900; text-decoration: none; font-weight: bold; display: inline-block; margin-bottom: 20px; font-size: 15px; }
        
        .stream-container { background-color: #161616; border: 1px solid #222; border-radius: 12px; padding: 30px; max-width: 800px; margin: 0 auto; display: flex; gap: 30px; align-items: center; }
        .game-preview-img { width: 200px; height: 270px; object-fit: cover; border-radius: 8px; border: 1px solid #333; }
        .stream-details { flex: 1; }
        .stream-details h1 { font-size: 28px; margin-bottom: 10px; }
        
        .meta-strip { margin-bottom: 15px; display: flex; gap: 15px; font-size: 13px; color: #aaa; }
        .rate-highlight { color: #76b900; font-weight: bold; }
        .description-text { color: #aaa; font-size: 14px; line-height: 1.5; margin-bottom: 20px; }
        
        .launch-panel { background: #1f1f1f; padding: 20px; border-radius: 8px; border: 1px solid #2a2a2a; }
        .launch-btn { background-color: #76b900; color: #000; border: none; padding: 14px; font-size: 15px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; text-transform: uppercase; }
        
        /* Live Streaming HUD */
        .stream-hud { display: none; background: #000; border: 2px dashed #76b900; padding: 20px; border-radius: 8px; text-align: center; }
        .timer-display { font-size: 32px; font-family: monospace; color: #76b900; font-weight: bold; margin: 10px 0; }
        .quit-btn { background-color: #ff3333; color: #fff; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 5px; }

        /* ==================================================== */
        /* 🔥 PHONE RESPONSIVE STYLING                          */
        /* ==================================================== */
        @media (max-width: 768px) {
            body { padding: 20px 4%; }
            .stream-container { flex-direction: column; text-align: center; padding: 20px; gap: 20px; } /* Poster stacks on top on mobile */
            .game-preview-img { width: 160px; height: 220px; }
            .stream-details h1 { font-size: 24px; }
            .meta-strip { justify-content: center; font-size: 12px; }
            .description-text { font-size: 13px; }
            .launch-btn { padding: 12px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <a href="/" class="back-link">← Return to Dashboard</a>

    <div class="stream-container">
        <img id="display-poster" src="" class="game-preview-img" alt="Poster">
        <div class="stream-details">
            <h1 id="display-title">Loading...</h1>
            <div class="meta-strip">
                <span>Server Rig: <b>RTX 4080</b></span>
                <span>Rate: <span class="rate-highlight">₹100 / Hr</span></span>
            </div>
            <p class="description-text">
                Allocates mobile latency acceleration lanes down to the core node. Safe states save automatically on exit.
            </p>
            
            <div class="launch-panel" id="setup-panel">
                <button class="launch-btn" onclick="triggerRigAllocation()">Start Game Stream</button>
            </div>

            <div class="stream-hud" id="active-hud">
                <div style="font-size: 11px; color: #aaa; text-transform: uppercase;">🔴 Streaming Active</div>
                <div class="timer-display" id="countdown-timer">60:00</div>
                <button class="quit-btn" onclick="terminateSession()">Disconnect Session</button>
            </div>
        </div>
    </div>

    <script>
        const database = {
            gta5: { title: "Grand Theft Auto V", img: "https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=400&q=80" },
            cyberpunk: { title: "Cyberpunk 2077", img: "https://images.unsplash.com/photo-1551103782-8ab07afd45c1?auto=format&fit=crop&w=400&q=80" },
            cs2: { title: "Counter-Strike 2", img: "https://images.unsplash.com/photo-1560253023-3ec5d502959f?auto=format&fit=crop&w=400&q=80" }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('id') || 'gta5';
        const gameData = database[gameId] || database.gta5;

        document.getElementById('display-title').innerText = gameData.title;
        document.getElementById('display-poster').src = gameData.img;

        let countdownInterval = null;

        async function triggerRigAllocation() {
            try {
                const res = await fetch('/api/launch-game', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ gameName: gameData.title })
                });
                const out = await res.json();
                
                if (res.ok) {
                    document.getElementById('setup-panel').style.display = 'none';
                    document.getElementById('active-hud').style.display = 'block';
                    startLiveTimer(60 * 60);
                } else {
                    alert(`❌ Failed: ${out.message}`);
                }
            } catch(e) { 
                document.getElementById('setup-panel').style.display = 'none';
                document.getElementById('active-hud').style.display = 'block';
                startLiveTimer(60 * 60);
            }
        }

        function startLiveTimer(totalSeconds) {
            if (countdownInterval) clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                totalSeconds--;
                if (totalSeconds <= 0) {
                    clearInterval(countdownInterval);
                    terminateSession();
                    return;
                }
                let minutes = Math.floor(totalSeconds / 60);
                let seconds = totalSeconds % 60;
                document.getElementById('countdown-timer').innerText = 
                    `${minutes < 10 ? "0" + minutes : minutes}:${seconds < 10 ? "0" + seconds : seconds}`;
            }, 1000);
        }

        async function terminateSession() {
            clearInterval(countdownInterval);
            try {
                const res = await fetch('/api/terminate-session', { method: 'POST' });
                const out = await res.json();
                alert(out.message);
            } catch (e) { alert("Session stopped."); }
            document.getElementById('active-hud').style.display = 'none';
            document.getElementById('setup-panel').style.display = 'block';
            document.getElementById('countdown-timer').innerText = "60:00";
        }
    </script>
</body>
</html>
